<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Create Account | Crest Wealth Investment</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:30px;

}

.register-box{

width:100%;

max-width:430px;

background:#fff;

border-radius:18px;

padding:35px;

box-shadow:0 20px 50px rgba(0,0,0,.35);

}

.logo{

text-align:center;

font-size:50px;

margin-bottom:10px;

}

.register-box h2{

text-align:center;

color:#1d4ed8;

margin-bottom:8px;

}

.register-box p{

text-align:center;

color:#666;

margin-bottom:20px;

}

.register-box input{

width:100%;

padding:14px;

margin:10px 0;

border:1px solid #ddd;

border-radius:10px;

font-size:15px;

outline:none;

transition:.3s;

}

.register-box input:focus{

border-color:#2563eb;

box-shadow:0 0 8px rgba(37,99,235,.25);

}

.register-box button{

width:100%;

padding:15px;

margin-top:15px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:.3s;

}

.register-box button:hover{

background:#1d4ed8;

}

.login{

margin-top:20px;

text-align:center;

}

.login a{

color:#2563eb;

font-weight:600;

text-decoration:none;

}

.login a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">
🏦
</div>

<h2>Create Account</h2>

<p>Join Crest Wealth Investment today.</p>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<input
type="text"
id="referralCode"
placeholder="Referral Code (Optional)">

<input
type="password"
id="password"
placeholder="Password"
required>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>
<button type="submit">

Create Account

</button>

<div class="login">

Already have an account?

<a href="login.html">

Login

</a>

</div>

</form>

</div>

<script src="register.js"></script>

</body>

</html>
