<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw Funds | Crest Wealth Investment</title>

<link rel="stylesheet" href="withdraw.css">

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f7fb;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:40px auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

.balance{
background:#10b981;
color:#fff;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

.balance h3{
margin:10px 0;
font-size:30px;
}

label{
display:block;
margin-top:15px;
margin-bottom:5px;
font-weight:bold;
}

input,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:8px;
background:#10b981;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#059669;
}

.back{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Withdraw Funds</h2>

<div class="balance">

<p>Withdrawable Balance</p>

<h3 id="withdrawableBalance">₦0.00</h3>

</div>

<label>Select Bank</label>

<select id="bankName" required>

<option value="">-- Select Bank --</option>

<option>Access Bank</option>
<option>Carbon</option>
<option>Citibank Nigeria</option>
<option>Ecobank Nigeria</option>
<option>Eyowo</option>
<option>FairMoney</option>
<option>Fidelity Bank</option>
<option>First Bank of Nigeria</option>
<option>First City Monument Bank (FCMB)</option>
<option>Globus Bank</option>
<option>Guaranty Trust Bank (GTBank)</option>
<option>Heritage Bank</option>
<option>Jaiz Bank</option>
<option>Keystone Bank</option>
<option>Kuda Bank</option>
<option>Lotus Bank</option>
<option>Mintyn Bank</option>
<option>Moniepoint</option>
<option>OPay</option>
<option>Optimus Bank</option>
<option>Paga</option>
<option>PalmPay</option>
<option>Parallex Bank</option>
<option>Paycom</option>
<option>Polaris Bank</option>
<option>PremiumTrust Bank</option>
<option>Providus Bank</option>
<option>Rubies Bank</option>
<option>Sparkle</option>
<option>Stanbic IBTC Bank</option>
<option>Sterling Bank</option>
<option>SunTrust Bank</option>
<option>TajBank</option>
<option>Titan Trust Bank</option>
<option>Union Bank</option>
<option>United Bank for Africa (UBA)</option>
<option>Unity Bank</option>
<option>VFD Microfinance Bank</option>
<option>Wema Bank</option>
<option>Zenith Bank</option>

</select>

<label>Account Number</label>

<input
type="text"
id="accountNumber"
maxlength="10"
placeholder="Enter Account Number"
required>

<label>Account Name</label>

<input
type="text"
id="accountName"
placeholder="Enter Account Name"
required>

<label>Amount</label>

<input
type="number"
id="amount"
placeholder="Enter Amount"
required>

<button onclick="submitWithdrawal()">

Request Withdrawal

</button>

<a href="dashboard.html" class="back">

← Back to Dashboard

</a>

<script src="withdraw.js"></script>

</div>

</body>
  </html>
