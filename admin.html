<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Young Invest Admin</title>

<link rel="stylesheet" href="admin.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<header>
<h1>Young Invest Admin Panel</h1>
</header>

<section class="cards">

<div class="card">
<h3>Total Users</h3>
<h2 id="totalUsers">0</h2>
</div>

<div class="card">
<h3>Pending Deposits</h3>
<h2 id="pendingCount">0</h2>
</div>

<div class="card">
<h3>Approved Deposits</h3>
<h2 id="approvedCount">0</h2>
</div>

</section>

<h2>Pending Deposits</h2>

<table id="depositTable">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Amount</th>

<th>Receipt</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody></tbody>

</table>

<h2>Users</h2>

<table id="userTable">

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Wallet</th>

<th>Investment</th>

</tr>

</thead>

<tbody></tbody>

</table>

</div>

<script src="admin.js"></script>

</body>
  </html>
