<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Deposit Funds | Young Invest</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#00c853;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.container h2{
text-align:center;
margin-bottom:20px;
color:#081826;
}

label{
font-weight:600;
display:block;
margin-top:20px;
margin-bottom:8px;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
}

.bank-box{
margin-top:30px;
background:#f8f8f8;
padding:20px;
border-radius:15px;
}

.bank-box p{
margin:10px 0;
font-size:16px;
}

.copy-btn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#081826;
color:white;
border-radius:10px;
cursor:pointer;
}

.deposit-btn{
width:100%;
padding:15px;
margin-top:30px;
border:none;
background:#00c853;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
}

.deposit-btn:hover{
background:#00a344;
}

.note{
margin-top:20px;
font-size:14px;
color:#666;
text-align:center;
}

</style>

</head>

<body>

<header>

💳 Deposit Funds

</header>

<div class="container">

<h2>Fund Your Wallet</h2>

<label>

Enter Deposit Amount

</label>

<input
type="number"
id="amount"
placeholder="Minimum ₦1000">

<div class="bank-box">

<p>

🏦 <strong>Bank:</strong>

CARBON MFB

</p>

<p>

👤 <strong>Account Name:</strong>

DAVID YOUNG

</p>

<p>

💳 <strong>Account Number:</strong>

<span id="accNumber">

9503282618

</span>

</p>

<button
class="copy-btn"
onclick="copyAccount()">

📋 Copy Account Number

</button>

</div>

<button
class="deposit-btn"
onclick="submitDeposit()">

✅ I Have Made Payment

</button>

<p class="note">

After making payment,
click the button above.
Your wallet will be credited
after confirmation.

</p>

</div>

<script>

function copyAccount(){

navigator.clipboard.writeText("9503282618");

alert("Account Number Copied!");

}

function submitDeposit(){

const amount=document.getElementById("amount").value;

if(amount==""){

alert("Please enter deposit amount.");

return;

}

alert("Deposit request submitted successfully.");

}

</script>

</body>

  </html>
