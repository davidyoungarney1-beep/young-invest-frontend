<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Deposit Funds | Young Invest</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="popup.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:#00c853;
color:white;
padding:20px;
text-align:center;
font-size:24px;
font-weight:700;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.container h2{
text-align:center;
color:#081826;
margin-bottom:20px;
}

label{
display:block;
margin-top:20px;
margin-bottom:8px;
font-weight:600;
color:#333;
}

input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#00c853;
}

.bank-box{
margin-top:25px;
background:#f7f7f7;
padding:20px;
border-radius:15px;
}

.bank-box p{
margin:10px 0;
font-size:16px;
}

.copy-btn{
width:100%;
padding:13px;
margin-top:15px;
border:none;
background:#081826;
color:white;
font-size:16px;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.copy-btn:hover{
background:#0f2b43;
}

.deposit-btn{
width:100%;
padding:15px;
margin-top:25px;
border:none;
background:#00c853;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.deposit-btn:hover{
background:#009624;
}

.deposit-btn:disabled{
opacity:.7;
cursor:not-allowed;
}

.note{
margin-top:20px;
font-size:14px;
text-align:center;
color:#666;
}
</style>

</head>

<body>

<header>

💳 Deposit Funds

</header>

<div class="container">

<h2>Fund Your Wallet</h2>

<label>

Deposit Amount (₦)

</label>

<input
type="number"
id="amount"
placeholder="Minimum ₦1000">

<div class="bank-box">

<p>

🏦 <strong>Bank:</strong>

CARBON MFB

</p>

<p>

👤 <strong>Account Name:</strong>

DAVID YOUNG

</p>

<p>

💳 <strong>Account Number:</strong>

<span id="accountNumber">

9503282618

</span>

</p>

<button
class="copy-btn"
onclick="copyAccount()">

📋 Copy Account Number

</button>

</div>

<button
id="depositBtn"
class="deposit-btn"
onclick="submitDeposit()">

✅ I Have Made Payment

</button>

<p class="note">

After making payment,
click the button above.
Your deposit will remain
pending until approved.

</p>

</div>  
<script src="popup.js"></script>

<script>

function copyAccount(){

navigator.clipboard.writeText("9503282618");

if(typeof showSuccess==="function"){

showSuccess(
"Copied!",
"Account number copied successfully."
);

}else{

alert("Account number copied.");

}

}

async function submitDeposit(){

const user=JSON.parse(localStorage.getItem("user"));

if(!user){

if(typeof showError==="function"){

showError(
"Login Required",
"Please login before making a deposit."
);

}else{

alert("Please login first.");

}

return;

}

const amount=document.getElementById("amount").value;

if(amount===""||Number(amount)<1000){

if(typeof showError==="function"){

showError(
"Invalid Amount",
"Minimum deposit is ₦1000."
);

}else{

alert("Minimum deposit is ₦1000.");

}

return;

}

const btn=document.getElementById("depositBtn");

btn.disabled=true;

btn.innerHTML="Submitting...";

try{

const response=await fetch(
"https://young-invest-backend.onrender.com/api/deposit",
{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

userId:user.id,

amount:Number(amount)

})

}

);

const data=await response.json();

btn.disabled=false;

btn.innerHTML="✅ I Have Made Payment";

if(response.ok){

if(typeof showSuccess==="function"){

showSuccess(

"Deposit Submitted",

"Your deposit request has been sent successfully and is awaiting approval.",

function(){

window.location.href="dashboard.html";

}

);

}else{

alert("Deposit submitted successfully.");

window.location.href="dashboard.html";

}

}else{

if(typeof showError==="function"){

showError(
"Submission Failed",
data.message||"Unable to submit deposit."
);

}else{

alert(data.message);

}

}

}catch(error){

btn.disabled=false;

btn.innerHTML="✅ I Have Made Payment";

if(typeof showError==="function"){

showError(
"Connection Error",
"Unable to connect to the server."
);

}else{

alert("Unable to connect to the server.");

}

}

}

</script>

</body>

  </html>
