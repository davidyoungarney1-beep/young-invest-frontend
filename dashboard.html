<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Young Invest</title>
<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#f4f7fb;
}

header{
    background:#0d1b2a;
    color:#fff;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.dashboard{
    padding:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card h3{
    margin:0;
    color:#0d1b2a;
}

.card p{
    font-size:24px;
    color:#00c853;
    font-weight:bold;
}

.actions{
    margin-top:30px;
}

.actions button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:#fff;
    cursor:pointer;
}

.actions button:hover{
    background:#009624;
}

table{
    width:100%;
    margin-top:30px;
    border-collapse:collapse;
    background:#fff;
}

table th,table td{
    padding:15px;
    border:1px solid #ddd;
    text-align:center;
}

th{
    background:#0d1b2a;
    color:#fff;
}
</style>
</head>

<body>

<header>
<h2>Young Invest Dashboard</h2>
<a href="index.html" style="color:white;text-decoration:none;">Logout</a>
</header>

<div class="dashboard">

<h2>Welcome, User</h2>

<div class="cards">

<div class="card">
<h3>Wallet Balance</h3>
<p>₦0.00</p>
</div>

<div class="card">
<h3>Active Investment</h3>
<p>0</p>
</div>

<div class="card">
<h3>Total Earnings</h3>
<p>₦0.00</p>
</div>

<div class="card">
<h3>Referral Bonus</h3>
<p>₦0.00</p>
</div>

</div>

<div class="actions">
<button>Deposit</button>
<button>Withdraw</button>
<button>Investment Plans</button>
</div>

<h2>Recent Transactions</h2>

<table>

<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
</tr>

<tr>
<td>No transactions yet</td>
<td>-</td>
<td>-</td>
<td>-</td>
</tr>

</table>

</div>

</body>
</html>
