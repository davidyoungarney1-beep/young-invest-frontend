<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | Crest Wealth Investment</title>

<link rel="stylesheet" href="popup.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:30px;
}

.login-box{
width:100%;
max-width:430px;
background:#fff;
border-radius:18px;
padding:35px;
box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
text-align:center;
font-size:50px;
margin-bottom:10px;
}

.login-box h2{
text-align:center;
color:#1d4ed8;
margin-bottom:8px;
}

.login-box p{
text-align:center;
color:#666;
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
outline:none;
transition:.3s;
}

.login-box input:focus{
border-color:#2563eb;
box-shadow:0 0 8px rgba(37,99,235,.25);
}

.login-box button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-box button:hover{
background:#1d4ed8;
}

.loader{
width:18px;
height:18px;
border:3px solid rgba(255,255,255,.3);
border-top:3px solid #fff;
border-radius:50%;
display:inline-block;
animation:spin .8s linear infinite;
vertical-align:middle;
margin-right:8px;
}

@keyframes spin{
100%{
transform:rotate(360deg);
}
}

button:disabled{
opacity:.8;
cursor:not-allowed;
}
.forgot-password{
margin-top:15px;
text-align:center;
}

.forgot-password a{
color:#2563eb;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.forgot-password a:hover{
color:#1d4ed8;
text-decoration:underline;
  }
.signup{
margin-top:20px;
text-align:center;
}

.signup a{
color:#2563eb;
font-weight:600;
text-decoration:none;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🏦</div>

<h2>Welcome Back</h2>

<p>Login to your investment account.</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="submit"
id="loginBtn">

Login

</button>

<div class="forgot-password">

<a href="forgot-password.html">

Forgot Password?

</a>

</div>

<div class="signup">

Don't have an account?

<a href="register.html">

Create Account

</a>

</div>

</form>

</div>

<script src="popup.js"></script>
<script src="login.js"></script>

</body>
</html>
