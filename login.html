<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Young Invest</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial,sans-serif;
}

.login-box{
    width:350px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
    color:#0d1b2a;
}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    background:#00c853;
    color:white;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.login-box button:hover{
    background:#009624;
}

.login-box p{
    text-align:center;
    margin-top:15px;
}

.login-box a{
    color:#00c853;
    text-decoration:none;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Login</h2>

<form id="loginForm">

<input type="email" id="email" placeholder="Email Address" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>
Don't have an account?
<a href="register.html">Register</a>
</p>

</form>

</div>

<script src="login.js"></script>

</body>
  </html>
